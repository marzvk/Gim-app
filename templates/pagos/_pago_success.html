<!-- Cierra modal y recarga tabla -->
<script>
    // Cerrar modal
    document.getElementById('modal-container').innerHTML = '';

    // Mostrar mensaje de éxito
    const alertaExito = document.createElement('div');
    alertaExito.className = 'alert alert-success alert-dismissible fade show position-fixed top-0 start-50 translate-middle-x mt-3';
    alertaExito.style.zIndex = '9999';
    alertaExito.innerHTML = `
        ✅ Pago registrado exitosamente
        <button type="button" class="btn-close" onclick="this.parentElement.remove()"></button>
    `;
    document.body.appendChild(alertaExito);
    
    // Auto-cerrar después de 3 segundos
    setTimeout(function() {
        alertaExito.remove();
    }, 3000);
    
    // Recargar tabla de clientes
    htmx.ajax('GET', window.location.search || '/', {
        target: '#clientes-container',
        swap: 'innerHTML'
    });
</script>

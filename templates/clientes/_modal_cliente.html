<div class="modal fade show" id="modalCliente" tabindex="-1" style="display: block;" aria-modal="true"hx-on:cliente-actualizado="document.getElementById('modal-container').innerHTML = ''">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">👤 Nuevo Cliente</h5>
                <button type="button" class="btn-close btn-close-white" 
                        onclick="document.getElementById('modal-container').innerHTML = ''"></button>
            </div>
            <form hx-post="{% url 'crear_cliente' %}" hx-target="#modal-container">
                {% csrf_token %}
                <div class="modal-body">
                    {{ form.as_p }}
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" 
                            onclick="document.getElementById('modal-container').innerHTML = ''">Cancelar</button>
                    <button type="submit" class="btn btn-success">Guardar Cliente</button>
                </div>
            </form>
        </div>
    </div>
</div>
<div class="modal-backdrop fade show"></div>

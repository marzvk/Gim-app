{% extends 'base.html' %}

{% block title %}Dashboard - Gimnasio{% endblock %}

{% block content %}
<div class="container-fluid">
    
    <!-- TABS DE TURNOS -->
    <ul class="nav nav-tabs mb-4" role="tablist" id="tabs-turnos">
        {% for turno in turnos %}
        <li class="nav-item" role="presentation">
            <a class="nav-link {% if turno == turno_actual %}active fw-bold{% endif %}" 
               href="?turno={{ turno.id }}"
               data-turno-id="{{ turno.id }}"
               hx-get="{% url 'dashboard' %}?turno={{ turno.id }}"
               hx-target="#clientes-container"
               hx-push-url="true"
               hx-swap="innerHTML"
               onclick="marcarTabActivo(this)">
                {{ turno.nombre }}
            </a>
        </li>
        {% endfor %}
    </ul>

    <!-- FORMULARIO DE BÚSQUEDA Y FILTROS -->
    <div class="card mb-3 shadow-sm">
        <div class="card-body">
            <!-- ID para hx-include -->
            <form id="form-filtros">
                <input type="hidden" id="turno-hidden" name="turno" value="{{ turno_actual.id|default:'' }}">
                
                <div class="row g-3">
                    <!-- Campo de búsqueda -->
                    <div class="col-md-6 position-relative">
                        <label for="id_busqueda" class="form-label">Buscar cliente</label>
                        <div class="d-flex align-items-center">
                        <input type="text" 
                               class="form-control" 
                               id="id_busqueda"
                               name="busqueda" 
                               placeholder="Nombre o apellido..."
                               value="{{ busqueda }}"
                              
                               hx-get="{% url 'dashboard' %}"
                               hx-target="#clientes-container"
                               hx-trigger="input changed delay:300ms"
                               hx-include="#form-filtros"
                               hx-indicator="#search-spinner">
                        <!-- Spinner pequeño dentro del input -->
                            <div id="search-spinner" class="htmx-indicator input-spinner text-muted">
                                <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Filtro por estado -->
                    <div class="col-md-3">
                        <label for="id_estado" class="form-label">Filtrar por estado</label>
                        <select class="form-select" id="id_estado" name="estado"
                                hx-get="{% url 'dashboard' %}"
                                hx-target="#clientes-container"
                                hx-trigger="change"
                                hx-include="#form-filtros"
                                hx-indicator="#estado-spinner">
                            <option value="">Todos</option>
                            <option value="al_dia" {% if filtro_estado == 'al_dia' %}selected{% endif %}>✅ Al día</option>
                            <option value="vencido" {% if filtro_estado == 'vencido' %}selected{% endif %}>❌ Vencido</option>
                            <option value="pendiente" {% if filtro_estado == 'pendiente' %}selected{% endif %}>⚠️ Pendiente</option>
                        </select>
                         <div id="estado-spinner" class="htmx-indicator input-spinner text-muted">
                            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                        </div>
                    </div>
                    
                    <!-- Botones -->
                    <div class="col-md-3 d-flex align-items-end gap-2">
                        <button type="button" 
                                id="btn-limpiar" 
                                class="btn btn-outline-secondary w-100"
                                hx-get="{% url 'dashboard' %}"
                                hx-target="#clientes-container"
                                hx-include="closest form">
                            🔄 Limpiar
                        </button>
                        <button type="button"
                                class="btn btn-success w-100 position-relative"
                                hx-get="{% url 'crear_cliente' %}"
                                hx-target="#modal-container">
                            ➕ Nuevo
                            <!-- Spinner en el botón nuevo -->
                            <span class="htmx-indicator position-absolute top-50 start-50 translate-middle">
                                <span class="spinner-border spinner-border-sm" role="status"></span>
                            </span>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- CONTENEDOR DE CLIENTES -->
    <div id="clientes-container" class="fade-in">
        {% include 'clientes/_tabla_clientes.html' %}
    </div>

     <!-- CONTENEDOR DE MODAL -->
    <div id="modal-container"></div>

</div>
{% endblock %}

{% block extra_js %}
<script>
  
// 1. Manejo visual de las Tabs (Styles only, HTMX maneja la data)
function marcarTabActivo(elemento) {
    // Ocultar toast previo si existe
    // (Opcional) Limpiar contenedor para efecto de carga fresca
    document.getElementById('clientes-container').style.opacity = '0.5';
    
    // Quitar active de todos
    document.querySelectorAll('#tabs-turnos .nav-link').forEach(function(link) {
        link.classList.remove('active', 'fw-bold');
    });
    // Agregar active al clickeado
    elemento.classList.add('active', 'fw-bold');
}

// Escuchar fin de la carga para restaurar opacidad
document.body.addEventListener('htmx:afterSwap', function(evt) {
    if(evt.detail.target.id === 'clientes-container') {
        evt.detail.target.style.opacity = '1';
    }
});

// 2. Recarga de datos (Reemplazo a lógica anterior)
// Ya no es necesaria la función 'aplicarFiltros' porque HTMX lo hace nativamente.
// Sin embargo, mantenemos los eventos que tenías para actualizar la tabla tras pagos/cambios.
document.body.addEventListener('pagoActualizado', function() {
    // Disparamos un evento de toast
    htmx.trigger(document.body, 'showToast', {message: 'Pago registrado correctamente', type: 'success'});
    
    // Recargamos la tabla actual (limpiando filtros o manteniendo, según preferencia)
    // Aquí recargamos con los filtros actuales usando HTMX en el input
    htmx.trigger('#id_busqueda', 'change'); 
});
document.body.addEventListener('clienteActualizado', function() {
    htmx.trigger(document.body, 'showToast', {message: 'Cliente guardado', type: 'success'});
    htmx.trigger('#id_busqueda', 'change');
});
document.body.addEventListener('clienteBorrado', function() {
    htmx.trigger(document.body, 'showToast', {message: 'Cliente eliminado', type: 'error'});
    htmx.trigger('#id_busqueda', 'change');
});
</script>
{% endblock %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gimnasio{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">


    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    {% load static %}
    <link rel="icon" href="{% static 'favicon.ico' %}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% if user.is_authenticated %}
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'dashboard' %}">
                <strong>🏋️ Gimnasio</strong>
            </a>
            
            <div class="navbar-nav ms-auto">
                <span class="navbar-text text-white me-3">
                    👤 {{ user.username }} 
                    {% if user.rol == 'dueño' %}
                        <span class="badge bg-warning text-dark">Dueño</span>
                    {% else %}
                        <span class="badge bg-light text-dark">Profesor</span>
                    {% endif %}
                </span>
                <!--  -->
                <form method="post" action="{% url 'logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        Cerrar Sesión
                    </button>              
                </form>                
            </div>
            <button id="theme-toggle" class="btn p-0 border-0 bg-transparent">
                <i class="bi bi-circle-half"></i>
            </button>
        </div>
    </nav>
    {% endif %}

    <!-- Contenido principal -->
    <main class="container-fluid py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>

<script>
(function() {
    const html = document.documentElement;
    const toggleBtn = document.getElementById('theme-toggle');
    const STORAGE_KEY = 'theme';

    // 1. Detectar preferencia del sistema
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    // 2. Ver si hay preferencia guardada
    const savedTheme = localStorage.getItem(STORAGE_KEY);

    // 3. Aplicar tema inicial
    if (savedTheme) {
        html.setAttribute('data-bs-theme', savedTheme);
    } else {
        html.setAttribute('data-bs-theme', systemPrefersDark ? 'dark' : 'light');
    }

    // 4. Toggle manual
    toggleBtn.addEventListener('click', () => {
        const current = html.getAttribute('data-bs-theme');
        const newTheme = current === 'dark' ? 'light' : 'dark';

        html.setAttribute('data-bs-theme', newTheme);
        localStorage.setItem(STORAGE_KEY, newTheme);
    });

})();
</script>

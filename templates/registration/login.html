{% extends 'base.html' %}

{% block title %}Login - Gimnasio{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">
                    🏋️ Gimnasio
                </h3>
                
                {% if form.errors %}
                <div class="alert alert-danger" role="alert">
                    Usuario o contraseña incorrectos
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Usuario</label>
                        <input type="text" 
                               name="username" 
                               id="id_username"
                               class="form-control" 
                               required 
                               autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="id_password" class="form-label">Contraseña</label>
                        <input type="password" 
                               name="password" 
                               id="id_password"
                               class="form-control" 
                               required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Ingresar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
